apiVersion: apps/v1
kind: Deployment
metadata:
  name: capitals-quiz-backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      sector: quiz-backend
      app: capitals
  template: 
    metadata:
      labels:
        sector: quiz-backend
        app: capitals
    spec:
      containers:
        - name: capitals-quiz-backend
          image: motetshurdle6p/capitals-quiz-fastapi:13
          ports:
            - containerPort: 8000
          volumeMounts:
            - mountPath: /user-data
              name: quiz-data
      volumes:
        - name: quiz-data
          persistentVolumeClaim:
            claimName: quiz-data-cl